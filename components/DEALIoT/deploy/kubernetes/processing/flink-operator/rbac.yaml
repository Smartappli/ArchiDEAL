apiVersion: v1
kind: ServiceAccount
metadata:
  name: dealiot-flink
  labels:
    app.kubernetes.io/name: flink-runtime
    app.kubernetes.io/part-of: dealiot
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dealiot-flink-native
  labels:
    app.kubernetes.io/part-of: dealiot
rules:
  - apiGroups: [""]
    resources: ["configmaps", "events", "pods", "pods/log", "services"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/finalizers"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dealiot-flink-native
  labels:
    app.kubernetes.io/part-of: dealiot
subjects:
  - kind: ServiceAccount
    name: dealiot-flink
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dealiot-flink-native
