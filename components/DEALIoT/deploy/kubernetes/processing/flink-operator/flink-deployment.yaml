apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: dealiot-streaming
  labels:
    app.kubernetes.io/name: flink-runtime
    app.kubernetes.io/part-of: dealiot
spec:
  image: ghcr.io/smartappli/dealiot-flink-pyflink:local-placeholder
  imagePullPolicy: IfNotPresent
  flinkVersion: v2_2
  mode: native
  serviceAccount: dealiot-flink
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "4"
    state.backend.type: rocksdb
    state.checkpoints.dir: s3://flink-checkpoints/streaming
    execution.checkpointing.savepoint-dir: s3://flink-savepoints/streaming
    high-availability.type: kubernetes
    high-availability.storageDir: s3://flink-ha/streaming
    execution.checkpointing.interval: 10s
    execution.checkpointing.mode: EXACTLY_ONCE
    execution.checkpointing.timeout: 5min
    execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
    restart-strategy.type: exponential-delay
    restart-strategy.exponential-delay.initial-backoff: 2s
    restart-strategy.exponential-delay.max-backoff: 30s
    jobmanager.scheduler: adaptive
    job.autoscaler.enabled: "true"
    job.autoscaler.scaling.enabled: "true"
    job.autoscaler.stabilization.interval: 2m
    job.autoscaler.metrics.window: 5m
    job.autoscaler.target.utilization: "0.6"
    job.autoscaler.utilization.min: "0.4"
    job.autoscaler.utilization.max: "0.8"
    job.autoscaler.catch-up.duration: 5m
    pipeline.max-parallelism: "120"
    kubernetes.operator.periodic.savepoint.interval: 6h
    kubernetes.operator.savepoint.history.max.count: "10"
    kubernetes.operator.savepoint.history.max.age: 7d
    metrics.reporters: prom
    metrics.reporter.prom.factory.class: >-
      org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prom.port: "9250"
    s3.endpoint: https://s3.example.net
    s3.path.style.access: "true"
  podTemplate:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9250"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/name: flink-runtime
        app.kubernetes.io/part-of: dealiot
    spec:
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 120
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: flink-main-container
          envFrom:
            - configMapRef:
                name: dealiot-runtime-config
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: dealiot-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dealiot-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dealiot-secrets
                  key: KAFKA_SASL_PASSWORD
            - name: ENABLE_BUILT_IN_PLUGINS
              value: flink-s3-fs-hadoop-2.2.1.jar;flink-metrics-prometheus-2.2.1.jar
            - name: FLINK_PYTHON
              value: /opt/flink/venv/bin/python
            - name: PYFLINK_CLIENT_EXECUTABLE
              value: /opt/flink/venv/bin/python
          ports:
            - name: metrics
              containerPort: 9250
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
  jobManager:
    replicas: 2
    resources:
      requests:
        cpu: 500m
        memory: 1536Mi
      limits:
        cpu: "2"
        memory: 3Gi
  taskManager:
    resources:
      requests:
        cpu: 500m
        memory: 1536Mi
      limits:
        cpu: "2"
        memory: 3Gi
  job:
    jarURI: local:///opt/flink/opt/flink-python-2.2.1.jar
    entryClass: org.apache.flink.client.python.PythonDriver
    args:
      - -pyclientexec
      - /opt/flink/venv/bin/python
      - -pyexec
      - /opt/flink/venv/bin/python
      - -py
      - /opt/flink/usrlib/streaming_minimal.py
    parallelism: 4
    upgradeMode: savepoint
    state: running
