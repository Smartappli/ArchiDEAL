apiVersion: batch/v1
kind: Job
metadata:
  name: bridge-flow-verifier
  labels:
    app.kubernetes.io/name: bridge-flow-verifier
    app.kubernetes.io/part-of: dealiot
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bridge-flow-verifier
        app.kubernetes.io/part-of: dealiot
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: publish-mqtt
          image: eclipse-mosquitto:2.0.18
          command:
            - sh
            - -ec
            - |
              for attempt in $(seq 1 30); do
                mosquitto_pub -h mqtt-broker -q 1 -t devices/smoke-001/sensor \
                  -m "{\"timestamp\":\"2026-07-10T12:00:00Z\",\"sequence\":${attempt}}" || true
                sleep 2
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
      containers:
        - name: verify-kafka
          image: apache/kafka:4.2.0
          command:
            - sh
            - -ec
            - |
              timeout 90 /opt/kafka/bin/kafka-console-consumer.sh \
                --bootstrap-server kafka:9092 \
                --topic raw.sensor \
                --from-beginning \
                --property print.value=true | grep -m1 'smoke-001'
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
