apiVersion: v1
kind: ConfigMap
metadata:
  name: mqtt-smoke-config
data:
  mosquitto.conf: |
    listener 1883 0.0.0.0
    allow_anonymous true
    persistence false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-broker
  labels:
    app.kubernetes.io/name: mqtt-broker
    app.kubernetes.io/part-of: dealiot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mqtt-broker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mqtt-broker
        app.kubernetes.io/part-of: dealiot
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mqtt
          image: eclipse-mosquitto:2.0.18
          ports:
            - name: mqtt
              containerPort: 1883
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config
              readOnly: true
            - name: data
              mountPath: /mosquitto/data
          readinessProbe:
            tcpSocket:
              port: mqtt
            periodSeconds: 2
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
      volumes:
        - name: config
          configMap:
            name: mqtt-smoke-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mqtt-broker
spec:
  selector:
    app.kubernetes.io/name: mqtt-broker
  ports:
    - name: mqtt
      port: 1883
      targetPort: mqtt
