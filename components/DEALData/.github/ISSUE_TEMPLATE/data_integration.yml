name: Data integration proposal
description: Propose a concrete DEALData integration, data contract, or ingestion scenario.
title: "Integration: "
labels: ["integration", "use-case"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form when a scenario could become a demo, pilot, partner integration, documentation example, or maintained data path.
  - type: dropdown
    id: primary_track
    attributes:
      label: Primary track
      options:
        - DEALIoT raw.gps ingestion
        - DEALIoT raw.sensor ingestion
        - WildFi decoding persistence
        - Core objects and experiments
        - GPS analytics or latest state
        - Sensor analytics or latest state
        - Data sharing or export readiness
        - DealHost managed deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: user_problem
    attributes:
      label: User problem
      description: Describe the operational or research decision this scenario should improve.
    validations:
      required: true
  - type: textarea
    id: data_path
    attributes:
      label: Data path
      description: List the input data, expected event contract, processing step, and output.
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Proof that could be produced
      description: Identify fixtures, docs, dashboards, scorecards, tests, or approved stories this use case could generate.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and sensitive data
      description: Note privacy, deployment, compliance, or partner constraints before any public material is created.
    validations:
      required: false
