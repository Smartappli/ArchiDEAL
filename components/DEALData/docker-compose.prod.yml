services:
  core:
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${CORE_DJANGO_SECRET_KEY:?set CORE_DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${CORE_DJANGO_ALLOWED_HOSTS:?set CORE_DJANGO_ALLOWED_HOSTS}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-true}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-31536000}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-true}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD:-true}
      DATABASE_USE_POSTGRES: "true"
      DATABASE_HOST: ${CORE_DATABASE_HOST:?set CORE_DATABASE_HOST}
      DATABASE_NAME: ${CORE_DATABASE_NAME:-dealdata_core}
      DATABASE_USER: ${CORE_DATABASE_USER:?set CORE_DATABASE_USER}
      DATABASE_PASSWORD: ${CORE_DATABASE_PASSWORD:?set CORE_DATABASE_PASSWORD}

  gps:
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${GPS_DJANGO_SECRET_KEY:?set GPS_DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${GPS_DJANGO_ALLOWED_HOSTS:?set GPS_DJANGO_ALLOWED_HOSTS}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-true}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-31536000}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-true}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD:-true}
      DEALDATA_INGEST_TOKEN: ${DEALDATA_INGEST_TOKEN:?set DEALDATA_INGEST_TOKEN}
      DATABASE_USE_POSTGRES: "true"
      DATABASE_HOST: ${GPS_DATABASE_HOST:?set GPS_DATABASE_HOST}
      DATABASE_NAME: ${GPS_DATABASE_NAME:-dealdata_gps}
      DATABASE_USER: ${GPS_DATABASE_USER:?set GPS_DATABASE_USER}
      DATABASE_PASSWORD: ${GPS_DATABASE_PASSWORD:?set GPS_DATABASE_PASSWORD}

  sensor:
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${SENSOR_DJANGO_SECRET_KEY:?set SENSOR_DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${SENSOR_DJANGO_ALLOWED_HOSTS:?set SENSOR_DJANGO_ALLOWED_HOSTS}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-true}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-31536000}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-true}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD:-true}
      DEALDATA_INGEST_TOKEN: ${DEALDATA_INGEST_TOKEN:?set DEALDATA_INGEST_TOKEN}
      DATABASE_USE_POSTGRES: "true"
      DATABASE_HOST: ${SENSOR_DATABASE_HOST:?set SENSOR_DATABASE_HOST}
      DATABASE_NAME: ${SENSOR_DATABASE_NAME:-dealdata_sensor}
      DATABASE_USER: ${SENSOR_DATABASE_USER:?set SENSOR_DATABASE_USER}
      DATABASE_PASSWORD: ${SENSOR_DATABASE_PASSWORD:?set SENSOR_DATABASE_PASSWORD}

  gps-dealiot-consumer:
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${GPS_DJANGO_SECRET_KEY:?set GPS_DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${GPS_DJANGO_ALLOWED_HOSTS:?set GPS_DJANGO_ALLOWED_HOSTS}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-true}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-31536000}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-true}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD:-true}
      DEALDATA_INGEST_TOKEN: ${DEALDATA_INGEST_TOKEN:?set DEALDATA_INGEST_TOKEN}
      DATABASE_USE_POSTGRES: "true"
      DATABASE_HOST: ${GPS_DATABASE_HOST:?set GPS_DATABASE_HOST}
      DATABASE_NAME: ${GPS_DATABASE_NAME:-dealdata_gps}
      DATABASE_USER: ${GPS_DATABASE_USER:?set GPS_DATABASE_USER}
      DATABASE_PASSWORD: ${GPS_DATABASE_PASSWORD:?set GPS_DATABASE_PASSWORD}
      DEALDATA_KAFKA_BOOTSTRAP_SERVERS: ${DEALDATA_KAFKA_BOOTSTRAP_SERVERS:-kafka1:9092,kafka2:9092,kafka3:9092}
      DEALDATA_GPS_KAFKA_TOPIC: ${DEALDATA_GPS_KAFKA_TOPIC:-raw.gps}
      DEALDATA_GPS_KAFKA_GROUP_ID: ${DEALDATA_GPS_KAFKA_GROUP_ID:-dealdata-gps-ingest}
      DEALDATA_KAFKA_AUTO_OFFSET_RESET: ${DEALDATA_KAFKA_AUTO_OFFSET_RESET:-earliest}
      DEALDATA_KAFKA_MAX_RECORDS: ${DEALDATA_KAFKA_MAX_RECORDS:-100}
      DEALDATA_KAFKA_POLL_TIMEOUT_MS: ${DEALDATA_KAFKA_POLL_TIMEOUT_MS:-1000}
      DEALDATA_KAFKA_SECURITY_PROTOCOL: ${DEALDATA_KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      DEALDATA_KAFKA_SASL_MECHANISM: ${DEALDATA_KAFKA_SASL_MECHANISM:-SCRAM-SHA-512}
      DEALDATA_KAFKA_SASL_USERNAME: ${DEALDATA_KAFKA_SASL_USERNAME:-}
      DEALDATA_KAFKA_SASL_PASSWORD: ${DEALDATA_KAFKA_SASL_PASSWORD:-}
      DEALDATA_KAFKA_SSL_CAFILE: ${DEALDATA_KAFKA_SSL_CAFILE:-}
      DEALDATA_KAFKA_SSL_CERTFILE: ${DEALDATA_KAFKA_SSL_CERTFILE:-}
      DEALDATA_KAFKA_SSL_KEYFILE: ${DEALDATA_KAFKA_SSL_KEYFILE:-}
      DEALDATA_KAFKA_SSL_CHECK_HOSTNAME: ${DEALDATA_KAFKA_SSL_CHECK_HOSTNAME:-true}

  sensor-dealiot-consumer:
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${SENSOR_DJANGO_SECRET_KEY:?set SENSOR_DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${SENSOR_DJANGO_ALLOWED_HOSTS:?set SENSOR_DJANGO_ALLOWED_HOSTS}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-true}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-31536000}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-true}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD:-true}
      DEALDATA_INGEST_TOKEN: ${DEALDATA_INGEST_TOKEN:?set DEALDATA_INGEST_TOKEN}
      DATABASE_USE_POSTGRES: "true"
      DATABASE_HOST: ${SENSOR_DATABASE_HOST:?set SENSOR_DATABASE_HOST}
      DATABASE_NAME: ${SENSOR_DATABASE_NAME:-dealdata_sensor}
      DATABASE_USER: ${SENSOR_DATABASE_USER:?set SENSOR_DATABASE_USER}
      DATABASE_PASSWORD: ${SENSOR_DATABASE_PASSWORD:?set SENSOR_DATABASE_PASSWORD}
      DEALDATA_KAFKA_BOOTSTRAP_SERVERS: ${DEALDATA_KAFKA_BOOTSTRAP_SERVERS:-kafka1:9092,kafka2:9092,kafka3:9092}
      DEALDATA_SENSOR_KAFKA_TOPIC: ${DEALDATA_SENSOR_KAFKA_TOPIC:-raw.sensor}
      DEALDATA_SENSOR_KAFKA_GROUP_ID: ${DEALDATA_SENSOR_KAFKA_GROUP_ID:-dealdata-sensor-ingest}
      DEALDATA_KAFKA_AUTO_OFFSET_RESET: ${DEALDATA_KAFKA_AUTO_OFFSET_RESET:-earliest}
      DEALDATA_KAFKA_MAX_RECORDS: ${DEALDATA_KAFKA_MAX_RECORDS:-100}
      DEALDATA_KAFKA_POLL_TIMEOUT_MS: ${DEALDATA_KAFKA_POLL_TIMEOUT_MS:-1000}
      DEALDATA_KAFKA_SECURITY_PROTOCOL: ${DEALDATA_KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      DEALDATA_KAFKA_SASL_MECHANISM: ${DEALDATA_KAFKA_SASL_MECHANISM:-SCRAM-SHA-512}
      DEALDATA_KAFKA_SASL_USERNAME: ${DEALDATA_KAFKA_SASL_USERNAME:-}
      DEALDATA_KAFKA_SASL_PASSWORD: ${DEALDATA_KAFKA_SASL_PASSWORD:-}
      DEALDATA_KAFKA_SSL_CAFILE: ${DEALDATA_KAFKA_SSL_CAFILE:-}
      DEALDATA_KAFKA_SSL_CERTFILE: ${DEALDATA_KAFKA_SSL_CERTFILE:-}
      DEALDATA_KAFKA_SSL_KEYFILE: ${DEALDATA_KAFKA_SSL_KEYFILE:-}
      DEALDATA_KAFKA_SSL_CHECK_HOSTNAME: ${DEALDATA_KAFKA_SSL_CHECK_HOSTNAME:-true}
