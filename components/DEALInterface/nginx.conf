server {
    listen 8080;
    server_name _;
    server_tokens off;
    charset utf-8;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"dealinterface"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
