apiVersion: v1
kind: ResourceQuota
metadata:
  name: runtime-apps-capacity
  namespace: archideal-runtime-apps
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  hard:
    pods: "100"
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    services: "50"
    configmaps: "100"
    secrets: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: runtime-apps-containers
  namespace: archideal-runtime-apps
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: "1"
        memory: 1Gi
      min:
        cpu: 10m
        memory: 32Mi
      max:
        cpu: "4"
        memory: 8Gi
