apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: runtime-apps-default-deny
  namespace: archideal-runtime-apps
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: runtime-apps-allow-dns-egress
  namespace: archideal-runtime-apps
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchExpressions:
              - key: k8s-app
                operator: In
                values: [kube-dns, coredns]
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
