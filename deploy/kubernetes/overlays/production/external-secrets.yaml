apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: archideal-runtime-secrets-${RELEASE_ID}
  labels:
    app.kubernetes.io/part-of: archideal
    archideal.io/release: "${RELEASE_ID}"
spec:
  refreshPolicy: CreatedOnce
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${SECRET_STORE_NAME}"
  target:
    name: archideal-runtime-secrets-${RELEASE_ID}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: archideal
          archideal.io/release: "${RELEASE_ID}"
  data:
    - secretKey: oauth2-client-id
      remoteRef:
        key: "${SECRET_PREFIX}/oauth2/client-id"
    - secretKey: oauth2-client-secret
      remoteRef:
        key: "${SECRET_PREFIX}/oauth2/client-secret"
    - secretKey: oauth2-cookie-secret
      remoteRef:
        key: "${SECRET_PREFIX}/oauth2/cookie-secret"
    - secretKey: apisix-admin-key
      remoteRef:
        key: "${SECRET_PREFIX}/apisix/admin-key"
    - secretKey: etcd-username
      remoteRef:
        key: "${SECRET_PREFIX}/etcd/username"
    - secretKey: etcd-password
      remoteRef:
        key: "${SECRET_PREFIX}/etcd/password"
    - secretKey: etcd-ca.crt
      remoteRef:
        key: "${SECRET_PREFIX}/pki/etcd-ca.crt"
    - secretKey: etcd-client.crt
      remoteRef:
        key: "${SECRET_PREFIX}/pki/apisix-etcd-client.crt"
    - secretKey: etcd-client.key
      remoteRef:
        key: "${SECRET_PREFIX}/pki/apisix-etcd-client.key"
    - secretKey: postgres-ca.crt
      remoteRef:
        key: "${SECRET_PREFIX}/pki/postgres-ca.crt"
    - secretKey: kafka-ca.crt
      remoteRef:
        key: "${SECRET_PREFIX}/pki/kafka-ca.crt"
    - secretKey: mqtt-ca.crt
      remoteRef:
        key: "${SECRET_PREFIX}/pki/mqtt-ca.crt"
    - secretKey: kafka-console-username
      remoteRef:
        key: "${SECRET_PREFIX}/kafka/console-username"
    - secretKey: kafka-console-password
      remoteRef:
        key: "${SECRET_PREFIX}/kafka/console-password"
    - secretKey: kafka-producer-username
      remoteRef:
        key: "${SECRET_PREFIX}/kafka/producer-username"
    - secretKey: kafka-producer-password
      remoteRef:
        key: "${SECRET_PREFIX}/kafka/producer-password"
    - secretKey: kafka-consumer-username
      remoteRef:
        key: "${SECRET_PREFIX}/kafka/consumer-username"
    - secretKey: kafka-consumer-password
      remoteRef:
        key: "${SECRET_PREFIX}/kafka/consumer-password"
    - secretKey: mqtt-username
      remoteRef:
        key: "${SECRET_PREFIX}/mqtt/username"
    - secretKey: mqtt-password
      remoteRef:
        key: "${SECRET_PREFIX}/mqtt/password"
    - secretKey: mqtt-smoke-username
      remoteRef:
        key: "${SECRET_PREFIX}/mqtt/smoke-username"
    - secretKey: mqtt-smoke-password
      remoteRef:
        key: "${SECRET_PREFIX}/mqtt/smoke-password"
    - secretKey: valkey-url
      remoteRef:
        key: "${SECRET_PREFIX}/valkey/tls-url"
    - secretKey: dealhost-django-secret-key
      remoteRef:
        key: "${SECRET_PREFIX}/dealhost/django-secret-key"
    - secretKey: dealhost-database-password
      remoteRef:
        key: "${SECRET_PREFIX}/postgres/dealhost-password"
    - secretKey: dealhost-api-tokens
      remoteRef:
        key: "${SECRET_PREFIX}/dealhost/api-tokens"
    - secretKey: dealhost-admin-api-tokens
      remoteRef:
        key: "${SECRET_PREFIX}/dealhost/admin-api-tokens"
    - secretKey: dealhost-oidc-client-id
      remoteRef:
        key: "${SECRET_PREFIX}/dealhost/oidc-client-id"
    - secretKey: dealhost-oidc-client-secret
      remoteRef:
        key: "${SECRET_PREFIX}/dealhost/oidc-client-secret"
    - secretKey: github-token
      remoteRef:
        key: "${SECRET_PREFIX}/github/token"
    - secretKey: github-webhook-secret
      remoteRef:
        key: "${SECRET_PREFIX}/github/webhook-secret"
    - secretKey: dealdata-core-database-password
      remoteRef:
        key: "${SECRET_PREFIX}/postgres/dealdata-core-password"
    - secretKey: dealdata-gps-database-password
      remoteRef:
        key: "${SECRET_PREFIX}/postgres/dealdata-gps-password"
    - secretKey: dealdata-sensor-database-password
      remoteRef:
        key: "${SECRET_PREFIX}/postgres/dealdata-sensor-password"
    - secretKey: dealdata-core-django-secret-key
      remoteRef:
        key: "${SECRET_PREFIX}/dealdata/core-django-secret-key"
    - secretKey: dealdata-gps-django-secret-key
      remoteRef:
        key: "${SECRET_PREFIX}/dealdata/gps-django-secret-key"
    - secretKey: dealdata-sensor-django-secret-key
      remoteRef:
        key: "${SECRET_PREFIX}/dealdata/sensor-django-secret-key"
    - secretKey: dealdata-ingest-token
      remoteRef:
        key: "${SECRET_PREFIX}/dealdata/ingest-token"
    - secretKey: management-console-oidc-client-id
      remoteRef:
        key: "${SECRET_PREFIX}/dealiot/oidc-client-id"
    - secretKey: management-console-oidc-client-secret
      remoteRef:
        key: "${SECRET_PREFIX}/dealiot/oidc-client-secret"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: archideal-registry-credentials
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: "${SECRET_STORE_NAME}"
  target:
    name: archideal-registry-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      metadata:
        labels:
          app.kubernetes.io/part-of: archideal
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: "${SECRET_PREFIX}/ghcr/dockerconfigjson"
