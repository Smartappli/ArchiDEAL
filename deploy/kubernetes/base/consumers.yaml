apiVersion: apps/v1
kind: Deployment
metadata:
  name: dealdata-gps-consumer
  labels:
    app.kubernetes.io/name: dealdata-gps-consumer
    app.kubernetes.io/component: consumer
    app.kubernetes.io/part-of: archideal
spec:
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dealdata-gps-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dealdata-gps-consumer
        app.kubernetes.io/component: consumer
        app.kubernetes.io/part-of: archideal
      annotations:
        archideal.io/release: "${RELEASE_ID}"
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      serviceAccountName: archideal-runtime
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 90
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: dealdata-gps-consumer
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: dealdata-gps-consumer
      containers:
        - name: consumer
          image: "${IMAGE_DEALDATA_GPS}"
          imagePullPolicy: IfNotPresent
          args: ["python", "manage.py", "consume_dealiot_kafka"]
          envFrom:
            - configMapRef:
                name: archideal-runtime
          env:
            - name: RUN_MIGRATIONS
              value: "0"
            - name: RUN_COLLECTSTATIC
              value: "0"
            - name: DEALDATA_CONSUMER_METRICS_BIND
              value: "0.0.0.0"
            - name: DEALDATA_CONSUMER_METRICS_PORT
              value: "9100"
            - name: DEALDATA_CONSUMER_STALE_AFTER_SECONDS
              value: "30"
            - name: DEALDATA_CONSUMER_DATABASE_CHECK_INTERVAL_SECONDS
              value: "15"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-gps-django-secret-key
            - name: DEALDATA_INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-ingest-token
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: archideal-runtime
                  key: DEALDATA_GPS_DATABASE_HOST
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: archideal-runtime
                  key: DEALDATA_GPS_DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: archideal-runtime
                  key: DEALDATA_GPS_DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-gps-database-password
            - name: DEALDATA_KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: kafka-consumer-username
            - name: DEALDATA_KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: kafka-consumer-password
          ports:
            - name: metrics
              containerPort: 9100
          startupProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: ca
              mountPath: /var/run/archideal-ca
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: ca
          secret:
            secretName: archideal-runtime-secrets-${RELEASE_ID}
            items:
              - key: postgres-ca.crt
                path: postgres-ca.crt
              - key: kafka-ca.crt
                path: kafka-ca.crt
        - name: tmp
          emptyDir: {}
---
