                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: github-token
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: github-webhook-secret
            - name: DEALHOST_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealhost-oidc-client-id
            - name: DEALHOST_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealhost-oidc-client-secret
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            httpGet:
              path: /api/gateway/health/live/
              port: http
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
                - name: Host
                  value: dealhost
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/gateway/health/ready/
              port: http
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
                - name: Host
                  value: dealhost
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 4
          livenessProbe:
            httpGet:
              path: /api/gateway/health/live/
              port: http
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
                - name: Host
                  value: dealhost
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: ca
              mountPath: /var/run/archideal-ca
              readOnly: true
            - name: staticfiles
              mountPath: /app/staticfiles
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: ca
          secret:
            secretName: archideal-runtime-secrets-${RELEASE_ID}
            items:
              - key: postgres-ca.crt
                path: postgres-ca.crt
        - name: staticfiles
          emptyDir: {}
        - name: tmp
          emptyDir: {}
