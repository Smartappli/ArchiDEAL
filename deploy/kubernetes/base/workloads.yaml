apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: identity-edge
    app.kubernetes.io/part-of: archideal
spec:
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy
        app.kubernetes.io/component: identity-edge
        app.kubernetes.io/part-of: archideal
      annotations:
        archideal.io/release: "${RELEASE_ID}"
        prometheus.io/scrape: "true"
        prometheus.io/port: "44180"
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      serviceAccountName: archideal-runtime
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: oauth2-proxy
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: oauth2-proxy
      initContainers:
        - name: validate-valkey-tls
          image: "${IMAGE_DEALHOST}"
          imagePullPolicy: IfNotPresent
          command: ["python", "-c"]
          args:
            - >-
              from dealhost.settings.env import cache_config;
              cache_config(require_tls=True)
          env:
            - name: VALKEY_URL
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: valkey-url
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      containers:
        - name: oauth2-proxy
          image: "${IMAGE_OAUTH2_PROXY}"
          imagePullPolicy: IfNotPresent
          args:
            - --provider=oidc
            - --oidc-issuer-url=${OIDC_ISSUER_URL}
            - --oidc-groups-claim=groups
            - --oidc-extra-audience=${OIDC_AUDIENCE}
            - --allowed-group=${OIDC_ALLOWED_GROUP}
            - --scope=openid profile email groups
            - --code-challenge-method=S256
            - --email-domain=*
            - --upstream=http://apisix:9080
            - --http-address=0.0.0.0:4180
            - --metrics-address=0.0.0.0:44180
            - --redirect-url=https://${PUBLIC_HOST}/oauth2/callback
            - --proxy-prefix=/oauth2
            - --reverse-proxy=true
            - --trusted-proxy-ip=${INGRESS_PROXY_CIDR}
            - --skip-provider-button=true
            - --skip-jwt-bearer-tokens=true
            - --skip-auth-route=POST=^/dealhost/api/gateway/github/webhook/$
            - --extra-jwt-issuers=${OIDC_ISSUER_URL}=${OIDC_AUDIENCE}
            - --bearer-token-login-fallback=false
            - --pass-authorization-header=false
            - --set-authorization-header=false
            - --pass-access-token=true
            - --set-xauthrequest=true
            - --pass-user-headers=true
            - --cookie-name=__Host-archideal
            - --cookie-path=/
            - --cookie-secure=true
            - --cookie-httponly=true
            - --cookie-samesite=lax
            - --cookie-refresh=15m
            - --cookie-expire=8h
            - --cookie-csrf-per-request=true
            - --cookie-csrf-expire=5m
            - --session-store-type=redis
            - --silence-ping-logging=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: oauth2-client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: oauth2-client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: oauth2-cookie-secret
            - name: OAUTH2_PROXY_REDIS_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: valkey-url
          ports:
            - name: http
              containerPort: 4180
            - name: metrics
              containerPort: 44180
          startupProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix
  labels:
    app.kubernetes.io/name: apisix
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: archideal
spec:
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apisix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apisix
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: archideal
      annotations:
        archideal.io/release: "${RELEASE_ID}"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: /apisix/prometheus/metrics
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      serviceAccountName: archideal-runtime
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 636
        runAsGroup: 636
        fsGroup: 636
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 3
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: apisix
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: apisix
      initContainers:
        - name: prepare-runtime
          image: "${IMAGE_APISIX}"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - cp -R /usr/local/apisix/. /runtime/
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 636
            runAsGroup: 636
          volumeMounts:
            - name: runtime
              mountPath: /runtime
            - name: tmp
              mountPath: /tmp
      containers:
        - name: apisix
          image: "${IMAGE_APISIX}"
          imagePullPolicy: IfNotPresent
          env:
            - name: APISIX_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: apisix-admin-key
            - name: ETCD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: etcd-username
            - name: ETCD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: etcd-password
            - name: OTEL_COLLECTOR_HTTP_ENDPOINT
              value: "${OTEL_COLLECTOR_HTTP_ENDPOINT}"
          ports:
            - name: proxy
              containerPort: 9080
            - name: admin
              containerPort: 9180
            - name: metrics
              containerPort: 9091
          startupProbe:
            tcpSocket:
              port: proxy
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9191
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: proxy
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 636
            runAsGroup: 636
          volumeMounts:
            - name: runtime
              mountPath: /usr/local/apisix
            - name: config
              mountPath: /usr/local/apisix/conf/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: ca
              mountPath: /var/run/archideal-ca
              readOnly: true
            - name: tmp
              mountPath: /tmp
        - name: apisix-health
          image: "${IMAGE_APISIX_BOOTSTRAP}"
          imagePullPolicy: IfNotPresent
          command: ["python", "/bootstrap/health.py"]
          args:
            - --upstream
            - http://127.0.0.1:9091/apisix/prometheus/metrics
            - --bind
            - 0.0.0.0
            - --port
            - "9191"
          ports:
            - name: health
              containerPort: 9191
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
      volumes:
        - name: runtime
          emptyDir: {}
        - name: config
          configMap:
            name: apisix-production-config
        - name: ca
          secret:
            secretName: archideal-runtime-secrets-${RELEASE_ID}
            items:
              - key: etcd-ca.crt
                path: etcd-ca.crt
              - key: etcd-client.crt
                path: etcd-client.crt
              - key: etcd-client.key
                path: etcd-client.key
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dealdata-core
  labels:
    app.kubernetes.io/name: dealdata-core
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: archideal
spec:
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dealdata-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dealdata-core
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: archideal
      annotations:
        archideal.io/release: "${RELEASE_ID}"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9101"
        prometheus.io/path: /metrics
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      serviceAccountName: archideal-runtime
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: dealdata-core
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: dealdata-core
      containers:
        - name: dealdata-core
          image: "${IMAGE_DEALDATA_CORE}"
          imagePullPolicy: IfNotPresent
          args:
            - granian
            - core.asgi:application
            - --interface
            - asgi
            - --host
            - 0.0.0.0
            - --port
            - "7000"
            - --workers
            - "4"
          envFrom:
            - configMapRef:
                name: archideal-runtime
          env:
            - name: RUN_MIGRATIONS
              value: "0"
            - name: RUN_COLLECTSTATIC
              value: "0"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-core-django-secret-key
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: archideal-runtime
                  key: DEALDATA_CORE_DATABASE_HOST
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: archideal-runtime
                  key: DEALDATA_CORE_DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: archideal-runtime
                  key: DEALDATA_CORE_DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-core-database-password
            - name: DEALDATA_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-oidc-client-id
            - name: DEALDATA_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-oidc-client-secret
          ports:
            - name: http
              containerPort: 7000
          startupProbe:
            httpGet:
              path: /health/live/
              port: http
              httpHeaders: &forwarded-https
                - name: X-Forwarded-Proto
                  value: https
                - name: Host
                  value: dealdata-core
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health/ready/
              port: http
              httpHeaders: *forwarded-https
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live/
              port: http
              httpHeaders: *forwarded-https
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: ca
              mountPath: /var/run/archideal-ca
              readOnly: true
            - name: staticfiles
              mountPath: /app/staticfiles
            - name: tmp
              mountPath: /tmp
        - name: metrics-proxy
          image: "${IMAGE_DEALDATA_CORE}"
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "dealdata_common.metrics_proxy"]
          args:
            - --upstream
            - http://127.0.0.1:7000/metrics/
            - --upstream-ready
            - http://127.0.0.1:7000/health/ready/
            - --upstream-host
            - dealdata-core
            - --bind
            - 0.0.0.0
            - --port
            - "9101"
          ports:
            - name: metrics
              containerPort: 9101
          startupProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      volumes:
        - name: ca
          secret:
            secretName: archideal-runtime-secrets-${RELEASE_ID}
            items:
              - key: postgres-ca.crt
                path: postgres-ca.crt
              - key: kafka-ca.crt
                path: kafka-ca.crt
        - name: staticfiles
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
