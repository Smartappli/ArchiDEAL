    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      serviceAccountName: archideal-runtime
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: dealdata-sensor
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: dealdata-sensor
      containers:
        - name: dealdata-sensor
          image: "${IMAGE_DEALDATA_SENSOR}"
          imagePullPolicy: IfNotPresent
          args:
            - granian
            - sensor.asgi:application
            - --interface
            - asgi
            - --host
            - 0.0.0.0
            - --port
            - "7002"
            - --workers
            - "4"
          envFrom:
            - configMapRef:
                name: archideal-runtime
          env:
            - name: RUN_MIGRATIONS
              value: "0"
            - name: RUN_COLLECTSTATIC
              value: "0"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-sensor-django-secret-key
            - name: DEALDATA_INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-ingest-token
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: archideal-runtime
                  key: DEALDATA_SENSOR_DATABASE_HOST
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: archideal-runtime
                  key: DEALDATA_SENSOR_DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: archideal-runtime
                  key: DEALDATA_SENSOR_DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-sensor-database-password
            - name: DEALDATA_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-oidc-client-id
            - name: DEALDATA_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-oidc-client-secret
          ports:
            - name: http
              containerPort: 7002
          startupProbe:
            httpGet:
              path: /health/live/
              port: http
              httpHeaders: &forwarded-https-sensor
                - name: X-Forwarded-Proto
                  value: https
                - name: Host
                  value: dealdata-sensor
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health/ready/
              port: http
              httpHeaders: *forwarded-https-sensor
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live/
              port: http
              httpHeaders: *forwarded-https-sensor
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: ca
              mountPath: /var/run/archideal-ca
              readOnly: true
            - name: staticfiles
              mountPath: /app/staticfiles
            - name: tmp
              mountPath: /tmp
        - name: metrics-proxy
          image: "${IMAGE_DEALDATA_SENSOR}"
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "dealdata_common.metrics_proxy"]
          args:
            - --upstream
            - http://127.0.0.1:7002/metrics/
            - --upstream-ready
            - http://127.0.0.1:7002/health/ready/
            - --upstream-host
            - dealdata-sensor
            - --bind
            - 0.0.0.0
            - --port
            - "9101"
          ports:
            - name: metrics
              containerPort: 9101
          startupProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      volumes:
        - name: ca
          secret:
            secretName: archideal-runtime-secrets-${RELEASE_ID}
            items:
              - key: postgres-ca.crt
                path: postgres-ca.crt
              - key: kafka-ca.crt
                path: kafka-ca.crt
        - name: staticfiles
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
