                  key: DEALDATA_CORE_DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: archideal-runtime
                  key: DEALDATA_CORE_DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealdata-core-database-password
          resources: &migration-resources
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext: &job-container-security
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          volumeMounts: &migration-mounts
            - name: ca
              mountPath: /var/run/archideal-ca
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes: &migration-volumes
        - name: ca
          secret:
            secretName: archideal-runtime-secrets-${RELEASE_ID}
            items:
              - key: postgres-ca.crt
                path: postgres-ca.crt
        - name: tmp
          emptyDir: {}
