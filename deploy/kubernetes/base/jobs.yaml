apiVersion: batch/v1
kind: Job
metadata:
  name: dealhost-migrate-${RELEASE_ID}
  labels:
    app.kubernetes.io/name: dealhost-migrate
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: archideal
    archideal.io/release: "${RELEASE_ID}"
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dealhost-migrate
        app.kubernetes.io/component: migration
        app.kubernetes.io/part-of: archideal
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      restartPolicy: Never
      serviceAccountName: archideal-migrations
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: "${IMAGE_DEALHOST}"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - python manage.py check --deploy && python manage.py migrate --noinput
          envFrom:
            - configMapRef:
                name: archideal-runtime
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: dealhost.settings.migration
            - name: DEALHOST_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archideal-runtime-secrets-${RELEASE_ID}
                  key: dealhost-database-password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: ca
              mountPath: /var/run/archideal-ca
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: ca
          secret:
            secretName: archideal-runtime-secrets-${RELEASE_ID}
            items:
              - key: postgres-ca.crt
                path: postgres-ca.crt
        - name: tmp
          emptyDir: {}
---
