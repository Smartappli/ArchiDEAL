apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchExpressions:
              - key: k8s-app
                operator: In
                values: [kube-dns, coredns]
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: oauth2-proxy-ingress
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: "${INGRESS_NAMESPACE}"
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
              app.kubernetes.io/component: controller
      ports:
        - protocol: TCP
          port: 4180
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: oauth2-proxy-egress
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: apisix
      ports:
        - protocol: TCP
          port: 9080
    - to:
        - ipBlock:
            cidr: "${OIDC_EGRESS_CIDR}"
      ports:
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: "${VALKEY_EGRESS_CIDR}"
      ports:
        - protocol: TCP
          port: 6380
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apisix-ingress
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: apisix
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: oauth2-proxy
      ports:
        - protocol: TCP
          port: 9080
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - apisix-bootstrap
                  - dealhost
      ports:
        - protocol: TCP
          port: 9180
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: "${MONITORING_NAMESPACE}"
          podSelector:
            matchLabels:
              monitoring.archideal.io/scraper: "true"
      ports:
        - protocol: TCP
          port: 9091
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apisix-egress
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: apisix
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - dealinterface
                  - dealhost
                  - dealdata-core
                  - dealdata-gps
                  - dealdata-sensor
                  - dealiot-console
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 7000
        - protocol: TCP
          port: 7001
        - protocol: TCP
          port: 7002
    - to:
        - ipBlock:
            cidr: "${ETCD_EGRESS_CIDR}"
      ports:
        - protocol: TCP
          port: 2379
    - to:
        - ipBlock:
            cidr: "${OTEL_EGRESS_CIDR}"
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-ingress-from-apisix
  labels:
    app.kubernetes.io/part-of: archideal
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - dealinterface
          - dealhost
          - dealdata-core
          - dealdata-gps
          - dealdata-sensor
          - dealiot-console
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: apisix
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 7000
        - protocol: TCP
          port: 7001
        - protocol: TCP
          port: 7002
---
