name: Component CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: component-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Monorepo contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: python -m pip install --upgrade PyYAML
      - run: python scripts/validate-monorepo.py
      - run: cp .env.example .env && docker compose --env-file .env config --quiet

  dealiot:
    name: DEALIoT contracts and deployment tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components/DEALIoT
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install Rust bridge system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake pkg-config libssl-dev libsasl2-dev libcurl4-openssl-dev
      - run: python -m unittest discover -s tests/unit -p "test_*.py" -v
      - run: python -m unittest -v tests/integration/test_platform_integration.py
      - run: python -m pip install PyYAML && python -m unittest -v tests/deployment/test_deployment_readiness.py
      - run: python -m unittest -v tests/test_application_smoke.py
      - run: cargo test --locked -p dealiot-event-contracts -p dealiot-mqtt-kafka-bridge

  dealhost:
    name: DEALHost
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components/DEALHost
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      - run: uv pip install --system -r requirements.txt
      - run: uv pip install --system -e . coverage
      - run: python manage.py makemigrations --check --dry-run
      - run: python scripts/validate_hosting_manifests.py
      - name: Test with coverage
        env:
          DJANGO_SETTINGS_MODULE: dealhost.settings.test
          GITHUB_TOKEN: test-token
          GITHUB_WEBHOOK_SECRET: test-secret
          APISIX_ADMIN_KEY: test-key
        run: coverage run manage.py test tests --verbosity 2
      - run: coverage report --fail-under=80

  dealdata:
    name: DEALData (${{ matrix.layer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: core_layer
            settings: core.settings
            package: core_data
          - layer: gps_layer
            settings: gps.settings
            package: gps_data
          - layer: sensor_layer
            settings: sensor.settings
            package: sensor_data
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: dealdata_test
          POSTGRES_USER: dealdata
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dealdata -d dealdata_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: components/DEALData
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: python -m pip install -r "${{ matrix.layer }}/requirements.txt" pytest pytest-cov pytest-django
      - name: Django checks and tests
        working-directory: components/DEALData/${{ matrix.layer }}
        env:
          PYTHONPATH: ${{ github.workspace }}/components/DEALData
          DATABASE_USE_POSTGRES: "true"
          DATABASE_HOST: 127.0.0.1
          DATABASE_NAME: dealdata_test
          DATABASE_USER: dealdata
          DATABASE_PASSWORD: test-password
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
          python -m pytest . --ds=${{ matrix.settings }} --cov=${{ matrix.package }} --cov-fail-under=80 -q

  dealinterface:
    name: DEALInterface
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components/DEALInterface
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: components/DEALInterface/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run build
