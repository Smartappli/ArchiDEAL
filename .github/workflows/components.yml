name: Component CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: component-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Monorepo contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
      - name: Compile every Python source file
        run: python -m compileall -q components deploy scripts tests
      - name: Lint DEALData shared and layer sources
        run: uvx ruff==0.15.16 check components/DEALData
      - name: Verify reproducible Python dependency locks
        working-directory: components
        run: |
          cd DEALData
          for layer in core_layer gps_layer sensor_layer; do
            uv pip compile "${layer}/requirements.txt" \
              --generate-hashes \
              --only-binary :all: \
              --universal \
              --python-version 3.14 \
              -o "${layer}/requirements.lock"
          done
          cd ../DEALHost
          uv export --frozen --no-dev --no-emit-project \
            --format requirements.txt \
            --output-file requirements.lock
          cd ../..
          git diff --exit-code -- \
            components/DEALData/core_layer/requirements.lock \
            components/DEALData/gps_layer/requirements.lock \
            components/DEALData/sensor_layer/requirements.lock \
            components/DEALHost/requirements.lock
      - run: python -m pip install --upgrade PyYAML
      - run: python -m unittest discover -s tests -p "test_*.py" -v
      - run: python scripts/validate-monorepo.py
      - run: cp .env.example .env && docker compose --env-file .env config --quiet

  dealiot:
    name: DEALIoT contracts and deployment tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components/DEALIoT
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.89.0 --profile minimal --no-self-update
      - name: Install Rust bridge system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake pkg-config libssl-dev libsasl2-dev libcurl4-openssl-dev
      - run: python -m unittest discover -s tests/unit -p "test_*.py" -v
      - run: python -m unittest -v tests/integration/test_platform_integration.py
      - run: python -m pip install PyYAML && python -m unittest -v tests/deployment/test_deployment_readiness.py
      - run: python -m unittest -v tests/test_application_smoke.py
      - run: cargo +1.89.0 test --locked -p dealiot-event-contracts -p dealiot-mqtt-kafka-bridge

  dealhost:
    name: DEALHost
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components/DEALHost
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
      - run: "uv pip install --system --require-hashes --only-binary :all: -r requirements.lock"
      - run: uv pip install --system coverage
      - run: python manage.py makemigrations --check --dry-run
      - run: python scripts/validate_hosting_manifests.py
      - name: Test with coverage
        env:
          DJANGO_SETTINGS_MODULE: dealhost.settings.test
          GITHUB_TOKEN: test-token
          GITHUB_WEBHOOK_SECRET: test-secret
          APISIX_ADMIN_KEY: test-key
        run: coverage run manage.py test tests --verbosity 2
      - run: coverage report --fail-under=80

  dealdata:
    name: DEALData (${{ matrix.layer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: core_layer
            settings: core.settings
            package: core_data
          - layer: gps_layer
            settings: gps.settings
            package: gps_data
          - layer: sensor_layer
            settings: sensor.settings
            package: sensor_data
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: dealdata_test
          POSTGRES_USER: dealdata
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dealdata -d dealdata_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: components/DEALData
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - run: "python -m pip install --require-hashes --only-binary :all: -r '${{ matrix.layer }}/requirements.lock'"
      - run: python -m pip install pytest pytest-cov pytest-django
      - name: Django checks and tests
        working-directory: components/DEALData/${{ matrix.layer }}
        env:
          PYTHONPATH: ${{ github.workspace }}/components/DEALData
          DATABASE_USE_POSTGRES: "true"
          DATABASE_HOST: 127.0.0.1
          DATABASE_NAME: dealdata_test
          DATABASE_USER: dealdata
          DATABASE_PASSWORD: test-password
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
          python -m pytest . --ds=${{ matrix.settings }} --cov=${{ matrix.package }} --cov-fail-under=80 -q

  dealinterface:
    name: DEALInterface
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components/DEALInterface
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: components/DEALInterface/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-e2e.txt
      - name: Selenium browser tests
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/dealinterface-vite.log 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/ >/dev/null && break
            sleep 1
          done
          npm run test:selenium
