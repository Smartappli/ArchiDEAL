name: Architecture Smoke

on:
  push:
    branches: [main]
    paths:
      - "compose.yaml"
      - ".env.example"
      - "deploy/**"
      - "scripts/**"
      - "components/DEALIoT/mqtt-kafka-bridge/**"
      - "components/DEALIoT/dealiot-event-contracts/**"
      - "components/DEALData/**"
      - "components/DEALHost/**"
      - "components/DEALInterface/**"
      - ".github/workflows/architecture-smoke.yml"
  pull_request:
    paths:
      - "compose.yaml"
      - ".env.example"
      - "deploy/**"
      - "scripts/**"
      - "components/DEALIoT/mqtt-kafka-bridge/**"
      - "components/DEALIoT/dealiot-event-contracts/**"
      - "components/DEALData/**"
      - "components/DEALHost/**"
      - "components/DEALInterface/**"
      - ".github/workflows/architecture-smoke.yml"
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: architecture-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - name: Generate ephemeral credentials
        run: ./scripts/bootstrap-env.sh
      - name: Validate configuration
        run: |
          python -m pip install "PyYAML==6.0.3"
          python scripts/validate-monorepo.py
          docker compose --env-file .env config --quiet
      - name: Build and start integration architecture
        run: docker compose --env-file .env up -d --build
      - name: Run end-to-end smoke test
        run: ./scripts/smoke-architecture.sh
      - name: Show status
        if: always()
        run: docker compose ps --all
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color --timestamps
      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans
